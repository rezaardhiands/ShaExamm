<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .card-soal { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; transition: 0.3s; }
        .opsi-container:hover { background: #f8f9fa; }
        .selected { background: #d1e7dd !important; border-color: #0f5132 !important; }
        .img-fluid { max-height: 250px; object-fit: contain; display: block; }
        .cheat-counter-badge { font-size: 0.9rem; padding: 6px 12px; border-radius: 20px; }
    </style>
</head>
<body class="bg-light">

    <div class="modal fade" id="cheatModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true" style="z-index: 2000;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="cheatModalTitle">⚠️ PERINGATAN KECURANGAN</h5>
                </div>
                <div class="modal-body fs-5" id="cheatModalBody">
                    Dilarang melakukan tindakan keluar dari aplikasi ujian!
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger w-100" id="btnConfirmCheat" onclick="tutupModalPeringatan()">SAYA MENGERTI</button>
                </div>
            </div>
        </div>
    </div>

    <div id="msgContainer" class="fixed-top p-3" style="z-index: 1050;">
        <div id="alertBox" class="alert alert-success d-none" role="alert">
            <span id="msgText"></span>
        </div>
    </div>

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4 class="text-center mb-3">Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button id="btnLogin" class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <div id="pilihPage" class="page container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4>Pilih Ujian</h4>
            <label class="small text-muted">Pilih Kelas:</label>
            <select id="pilihKelas" class="form-select mb-2">
            	<option value="">Pilih Kelas</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
            <label class="small text-muted">Pilih Mapel:</label>
            <select id="pilihMapel" class="form-select mb-2">
            	<option value="">Pilih Mapel</option>
                <option value="IPA">IPA</option>
                <option value="IPS">IPS</option>
                <option value="COBA">COBA</option>
            </select>
            <label class="small text-muted">Token Ujian:</label>
            <input id="inputToken" class="form-control mb-3" placeholder="Token Ujian">
            <button id="btnMulai" class="btn btn-success w-100" onclick="mulaiUjian()">MULAI UJIAN</button>
        </div>
    </div>

    <div id="ujianPage" class="page container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3 p-2 bg-white rounded shadow-sm">
            <span id="namaPesertaUjian" class="fw-bold text-secondary">Siswa</span>
            <div id="statusPelanggaranBox" class="badge bg-success cheat-counter-badge">
                Pelanggaran: 0 / 2
            </div>
        </div>

        <div class="card-soal">
            <p id="nomer-soal" class="fw-bold"></p>
            <p id="pertanyaanText"></p>
            <div id="opsiBox"></div>
        </div>
        <div class="d-flex justify-content-between mt-3 mb-5">
            <button class="btn btn-secondary" onclick="navSoal(-1)">Prev</button>
            <button id="btnNext" class="btn btn-primary" onclick="navSoal(1)">Next</button>
            <button id="btnSelesai" class="btn btn-danger" style="display:none;" onclick="konfirmasiSelesai()">SELESAI</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // =========================================================================
        // PENTING: TEMPEL URL WEB APP HASIL RE-DEPLOY ANDA DI SINI
        // =========================================================================
        const DEPLOY_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBRqOjV-UVOxpowQWjI8CASdazcIXMwUpAAdBvjlgRxJ1J83hj_6XjIFRfj5kfpb__Bw/exec"; 

        let currentIdx = 0, bankSoal = [], usernameLogin = "", passwordLogin = "";
        let cheatCount = 0; 
        const maxViolations = 2;
        let isProcessingSubmit = false; 
        let bsCheatModal = null; // Instansi objek Modal Bootstrap

        // DETEKSI KECURANGAN
        function aktifkanCheatDetector() {
            bsCheatModal = new bootstrap.Modal(document.getElementById('cheatModal'));

            document.addEventListener("visibilitychange", function() {
                if (document.hidden) { 
                    handleViolation("Membuka tab baru / Keluar aplikasi!"); 
                }
            });

            window.addEventListener("blur", function() {
                handleViolation("Membuka panel notifikasi / Floating apps / Kehilangan fokus layar!");
            });

            window.addEventListener("resize", function() {
                if (document.getElementById('ujianPage').classList.contains('active')) {
                    handleViolation("Mengaktifkan mode Split Screen / Mengubah ukuran layar!");
                }
            });
        }

        function handleViolation(reason) {
            // JIKA SUDAH PROSES KIRIM ATAU MODAL SEDANG TERBUKA, TOLAK PELANGGARAN DOBEL
            if(!document.getElementById('ujianPage').classList.contains('active') || isProcessingSubmit) {
                return;
            }

            // Kunci state penanganan pelanggaran saat ini agar event blur berikutnya tidak masuk antrean
            isProcessingSubmit = true; 
            cheatCount++;
            
            // Update UI
            const statusBox = document.getElementById('statusPelanggaranBox');
            if (statusBox) {
                statusBox.innerText = `Pelanggaran: ${cheatCount} / ${maxViolations}`;
                statusBox.className = "badge bg-danger cheat-counter-badge";
            }

            if (cheatCount >= maxViolations) {
                // Set konten modal pemblokiran final
                document.getElementById('cheatModalTitle').innerText = "🚨 AKUN ANDA DIBLOKIR";
                document.getElementById('cheatModalBody').innerHTML = "Batas pelanggaran habis! Akun Anda diblokir untuk ujian ini.<br><br><strong>Jawaban Anda saat ini otomatis dikirim ke server.</strong>";
                document.getElementById('btnConfirmCheat').innerText = "KEMBALI KE LOGIN";
                
                let k = document.getElementById('pilihKelas').value;
                let m = document.getElementById('pilihMapel').value;
                localStorage.setItem(`blocked_${usernameLogin}_${k}_${m}`, "true");
                
                bsCheatModal.show();
                kirimKeServerOtomatis();
            } else {
                // Tampilkan modal peringatan pertama secara non-blocking
                document.getElementById('cheatModalTitle').innerText = "⚠️ PERINGATAN KECURANGAN";
                document.getElementById('cheatModalBody').innerHTML = `Peringatan [${cheatCount}/${maxViolations}]:<br><strong>Dilarang ${reason}</strong>`;
                document.getElementById('btnConfirmCheat').innerText = "SAYA MENGERTI, LANJUTKAN UJIAN";
                
                bsCheatModal.show();
            }
        }

        // Fungsi kontrol penutupan modal dialog kustom
        function tutupModalPeringatan() {
            if (cheatCount >= maxViolations) {
                // Jika sudah diblokir total, klik tombol wajib mengembalikan ke login awal (refresh aplikasi)
                location.reload();
            } else {
                // Jika baru pelanggaran pertama, tutup modal dan buka kembali kunci deteksi
                bsCheatModal.hide();
                setTimeout(() => {
                    isProcessingSubmit = false; 
                }, 500); // Beri jeda 500ms agar focus kembali stabil
            }
        }

        // --- FUNGSI LOGIN ---
        function login() {
            let u = document.getElementById('u').value.trim();
            let p = document.getElementById('p').value.trim();
            const btn = document.getElementById('btnLogin');
            
            if(u === "" || p === "") { alert("Isi Username & Password!"); return; }
            
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            const loginCallback = "handleLoginRes_" + Math.floor(Math.random() * 100000);
            
            window[loginCallback] = function(res) {
                document.getElementById(loginCallback).remove();
                delete window[loginCallback];
                
                btn.innerText = "MASUK";
                btn.disabled = false;
                
                if(res.status === "success") {
                    usernameLogin = u;
                    passwordLogin = p;
                    isProcessingSubmit = false; 
                    
                    if(res.kelas) { document.getElementById('pilihKelas').value = res.kelas; }
                    pindahHalaman('pilihPage');
                } else {
                    alert("Login Gagal: " + (res.message || "Username atau Password salah!"));
                }
            };

            const scriptTag = document.createElement("script");
            scriptTag.id = loginCallback;
            scriptTag.src = `${DEPLOY_WEB_APP_URL}?action=apiLogin&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&prefix=${loginCallback}`;
            
            scriptTag.onerror = function() {
                btn.innerText = "MASUK";
                btn.disabled = false;
                alert("Gagal terhubung ke server! Periksa koneksi internet HP siswa.");
                scriptTag.remove();
            };

            document.body.appendChild(scriptTag);
        }

        // AMBIL SOAL MENGGUNAKAN METODE JSONP BYPASS
        function mulaiUjian() {
            let k = document.getElementById('pilihKelas').value;
            let m = document.getElementById('pilihMapel').value;
            let t = document.getElementById('inputToken').value;
            
            if (k === "") { alert("Pilih Kelas terlebih dahulu!"); return; }
            if (m === "") { alert("Pilih Mata Pelajaran terlebih dahulu!"); return; }
            
            const btn = document.getElementById('btnMulai');
            btn.innerText = "Menghubungkan ke Server...";
            btn.disabled = true;

            const callbackName = "handleDataSoal_" + Math.floor(Math.random() * 100000);
            window[callbackName] = function(res) {
                document.getElementById(callbackName).remove();
                delete window[callbackName];
                
                btn.innerText = "MULAI UJIAN";
                btn.disabled = false;
                
                if(res.status === "error") {
                    alert("Eror: " + res.message);
                } else if(res.data.length === 0) {
                    alert("Soal tidak ditemukan! Periksa kembali Kelas & Mapel.");
                } else {
                    localStorage.removeItem(`blocked_${usernameLogin}_${k}_${m}`);
                    bankSoal = res.data;
                    isProcessingSubmit = false; 
                    
                    for (let key in localStorage) {
                        if (key.startsWith("soal_")) {
                            localStorage.removeItem(key);
                        }
                    }
                    
                    cheatCount = 0;
                    const statusBox = document.getElementById('statusPelanggaranBox');
                    if (statusBox) {
                        statusBox.innerText = `Pelanggaran: 0 / ${maxViolations}`;
                        statusBox.className = "badge bg-success cheat-counter-badge";
                    }

                    const namaBox = document.getElementById('namaPesertaUjian');
                    if (namaBox) { namaBox.innerText = usernameLogin; }

                    currentIdx = 0;
                    pindahHalaman('ujianPage');
                    aktifkanCheatDetector();
                    renderSoal();
                }
            };

            const scriptTag = document.createElement("script");
            scriptTag.id = callbackName;
            scriptTag.src = `${DEPLOY_WEB_APP_URL}?action=apiGetSoal&kelas=${k}&mapel=${m}&token=${encodeURIComponent(t)}&username=${encodeURIComponent(usernameLogin)}&password=${encodeURIComponent(passwordLogin)}&prefix=${callbackName}`;
            
            scriptTag.onerror = function() {
                btn.innerText = "MULAI UJIAN";
                btn.disabled = false;
                alert("Gagal mengunduh soal! Periksa koneksi internet atau parameter ujian.");
                scriptTag.remove();
            };

            document.body.appendChild(scriptTag);
        }

        function simpanJawaban(id, v) {
            let soal = bankSoal.find(s => s.id == id);
            let tersimpan = localStorage.getItem("soal_" + id);
            let pilihan = tersimpan ? JSON.parse(tersimpan) : [];
            
            if (soal.jenis === 'PG' || soal.jenis === 'BS') {
                pilihan = [v];
            } else {
                if (pilihan.includes(v)) { 
                    pilihan = pilihan.filter(item => item !== v);
                } else { 
                    pilihan.push(v); 
                }
            }
            localStorage.setItem("soal_" + id, JSON.stringify(pilihan));
            renderSoal();
        }

        function renderSoal() {
            const soal = bankSoal[currentIdx];
            document.getElementById('nomer-soal').innerText = "Soal No. " + (currentIdx + 1) + " [" + soal.jenis + "]";
            document.getElementById('pertanyaanText').innerText = soal.tanya;
            
            let htmlGambar = soal.gambar ? `<img src="${soal.gambar}" class="img-fluid mb-3 rounded shadow-sm">` : "";
            let tersimpan = localStorage.getItem("soal_" + soal.id);
            let pilihan = tersimpan ? JSON.parse(tersimpan) : [];
            
            let opsiTersedia = (soal.jenis === 'BS') ? ['a', 'b'] : ['a', 'b', 'c', 'd'];
            let htmlOpsi = opsiTersedia.map(p => {
                const isSelected = pilihan.includes(p) ? "selected" : "";
                return `<div class="opsi-container ${isSelected}" onclick="simpanJawaban('${soal.id}', '${p}')">
                            <strong>${p.toUpperCase()}.</strong> ${soal[p] || ""}
                        </div>`;
            }).join('');
            
            document.getElementById('opsiBox').innerHTML = htmlGambar + htmlOpsi;
            document.getElementById('btnNext').style.display = (currentIdx === bankSoal.length - 1) ? "none" : "block";
            document.getElementById('btnSelesai').style.display = (currentIdx === bankSoal.length - 1) ? "block" : "none";
        }

        function navSoal(step) { 
            if(currentIdx + step >= 0 && currentIdx + step < bankSoal.length) {
                currentIdx += step;
                renderSoal(); 
                window.scrollTo(0, 0);
            }
        }

        // Mengatur perpindahan halaman secara aman
        function pindahHalaman(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            window.scrollTo(0, 0);
        }

        function konfirmasiSelesai() {
            if(!confirm("Yakin ingin menyelesaikan ujian?")) return;
            isProcessingSubmit = true; 
            kirimKeServerOtomatis();
        }

        function kirimKeServerOtomatis() {
            let jawaban = {};
            bankSoal.forEach(s => {
                jawaban[s.id] = localStorage.getItem("soal_" + s.id) || "[]";
            });

            let k = document.getElementById('pilihKelas').value;
            let m = document.getElementById('pilihMapel').value;

            const payload = {
                action: "apiSubmit", 
                username: usernameLogin,
                kelas: k,
                mapel: m,
                jawaban: jawaban,
                cheatLog: cheatCount
            };

            const btnSelesai = document.getElementById('btnSelesai');
            if (btnSelesai) {
                btnSelesai.innerText = "Mengirim...";
                btnSelesai.disabled = true;
            }

            fetch(DEPLOY_WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                showSuccessMessage("Jawaban berhasil dikirim."); 
                
                for (let key in localStorage) {
                    if (key.startsWith("soal_")) {
                        localStorage.removeItem(key);
                    }
                }
                
                // Jika pengiriman karena selesai normal (bukan karena terblokir max pelanggaran)
                if(cheatCount < maxViolations) {
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                }
            })
            .catch(err => {
                alert("Koneksi bermasalah saat mengirim nilai! Cari sinyal stabil lalu tekan SELESAI lagi. Detil: " + err);
                if (btnSelesai) {
                    btnSelesai.innerText = "SELESAI";
                    btnSelesai.disabled = false;
                }
                if(cheatCount < maxViolations) isProcessingSubmit = false; 
            });
        }

        function showSuccessMessage(message) {
            const alertBox = document.getElementById('alertBox');
            document.getElementById('msgText').innerText = message;
            alertBox.classList.remove('d-none');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .card-soal { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; transition: 0.3s; }
        .opsi-container:hover { background: #f8f9fa; }
        .selected { background: #d1e7dd !important; border-color: #0f5132 !important; }
    </style>
</head>
<body class="bg-light">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx79KoPf2FJq9VI2ofk5FJLLr2FuLuJMmcII6sbS3UF4Xt9h_Apob63WNIv4prw80N1/exec";
    </script>

    <div id="msgContainer" class="fixed-top p-3" style="z-index: 1050;">
        <div id="alertBox" class="alert alert-success d-none" role="alert">
            <span id="msgText"></span>
        </div>
    </div>

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4 class="text-center">Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <div id="pilihPage" class="page container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4>Pilih Ujian</h4>
            <select id="pilihKelas" class="form-select mb-2"><option value="7">7</option><option value="8">8</option></select>
            <select id="pilihMapel" class="form-select mb-2"><option value="IPA">IPA</option><option value="IPS">IPS</option><option value="MATEMATIKA">MATEMATIKA</option></select>
            <input id="inputToken" class="form-control mb-2" placeholder="Token Ujian">
            <button class="btn btn-success w-100" onclick="mulaiUjian()">MULAI</button>
        </div>
    </div>

    <div id="ujianPage" class="page container mt-4">
        <div class="card-soal">
            <p id="nomer-soal" class="fw-bold"></p>
            <p id="pertanyaanText"></p>
            <div id="opsiBox"></div>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <button class="btn btn-secondary" onclick="navSoal(-1)">Prev</button>
            <button id="btnNext" class="btn btn-primary" onclick="navSoal(1)">Next</button>
            <button id="btnSelesai" class="btn btn-danger" style="display:none;" onclick="konfirmasiSelesai()">SELESAI</button>
        </div>
    </div>

    <script>
        let currentIdx = 0, bankSoal = [], usernameLogin = "";

        // PERBAIKAN FUNGSI LOGIN (Menggunakan Fetch)
        function login() {
            let u = document.getElementById('u').value;
            let p = document.getElementById('p').value;
            
            if(u === "" || p === "") { 
                alert("Isi Username & Password!"); 
                return; 
            }

            const btn = document.querySelector('button[onclick="login()"]');
            btn.innerText = "Memproses...";
            btn.disabled = true;

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ type: "login", username: u, password: p })
            })
            .then(res => res.json())
            .then(res => {
                btn.innerText = "MASUK";
                btn.disabled = false;
                
                if(res.status === "success") { 
                    usernameLogin = u; 
                    pindahHalaman('pilihPage'); 
                } else { 
                    alert("Username atau Password salah!"); 
                }
            })
            .catch(err => {
                btn.innerText = "MASUK";
                btn.disabled = false;
                alert("Error sistem: Gagal terhubung ke server.");
                console.error(err);
            });
        }

        // PERBAIKAN FUNGSI AMBIL SOAL (Menggunakan Fetch)
        function mulaiUjian() {
            let k = document.getElementById('pilihKelas').value;
            let m = document.getElementById('pilihMapel').value;
            let t = document.getElementById('inputToken').value;
            
            const btn = document.querySelector('#pilihPage button');
            btn.innerText = "Tunggu sebentar...";
            btn.disabled = true;
            
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ type: "getSoal", kelas: k, mapel: m, token: t })
            })
            .then(res => res.json())
            .then(res => {
                btn.innerText = "MULAI";
                btn.disabled = false;
                
                if(res.status === "error") {
                    alert(res.message);
                } else { 
                    bankSoal = res.data; 
                    localStorage.clear(); 
                    pindahHalaman('ujianPage'); 
                    renderSoal(); 
                }
            })
            .catch(err => {
                btn.innerText = "MULAI";
                btn.disabled = false;
                alert("Terjadi kesalahan sistem saat mengambil soal.");
                console.error(err);
            });
        }

        function simpanJawaban(id, v) {
            let soal = bankSoal.find(s => s.id == id);
            let tersimpan = localStorage.getItem("soal_" + id);
            let pilihan = tersimpan ? JSON.parse(tersimpan) : [];

            if (soal.jenis === 'PG' || soal.jenis === 'BS') {
                pilihan = [v];
            } else {
                if (pilihan.includes(v)) { 
                    pilihan = pilihan.filter(item => item !== v); 
                } else { 
                    pilihan.push(v); 
                }
            }
            
            localStorage.setItem("soal_" + id, JSON.stringify(pilihan));
            renderSoal();
        }

        function renderSoal() {
            const soal = bankSoal[currentIdx];
            document.getElementById('nomer-soal').innerText = "Soal No. " + (currentIdx + 1);
            document.getElementById('pertanyaanText').innerText = soal.tanya;
            
            let htmlGambar = soal.gambar ? `<img src="${soal.gambar}" class="img-fluid mb-3 rounded">` : "";
            let tersimpan = localStorage.getItem("soal_" + soal.id);
            let pilihan = tersimpan ? JSON.parse(tersimpan) : [];

            let opsiTersedia = (soal.jenis === 'BS') ? ['a', 'b'] : ['a', 'b', 'c', 'd'];

            let htmlOpsi = opsiTersedia.map(p => {
                const isSelected = pilihan.includes(p) ? "selected" : "";
                return `<div class="opsi-container ${isSelected}" onclick="simpanJawaban('${soal.id}', '${p}')">
                            <strong>${p.toUpperCase()}.</strong> ${soal[p]}
                        </div>`;
            }).join('');
            
            document.getElementById('opsiBox').innerHTML = htmlGambar + htmlOpsi;
            document.getElementById('btnNext').style.display = (currentIdx === bankSoal.length - 1) ? "none" : "block";
            document.getElementById('btnSelesai').style.display = (currentIdx === bankSoal.length - 1) ? "block" : "none";
        }

        function navSoal(step) { 
            if(currentIdx + step >= 0 && currentIdx + step < bankSoal.length) {
                currentIdx += step; 
                renderSoal(); 
            }
        }

        function pindahHalaman(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        // PERBAIKAN FUNGSI SUBMIT JAWABAN (Menggunakan Fetch)
        function konfirmasiSelesai() {
            if(!confirm("Yakin ingin menyelesaikan ujian?")) return;
                      
            let jawaban = {}; 
            bankSoal.forEach(s => {
                jawaban[s.id] = localStorage.getItem("soal_" + s.id) || "[]";
            });
            
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    type: "submit",
                    username: usernameLogin,
                    kelas: document.getElementById('pilihKelas').value,
                    mapel: document.getElementById('pilihMapel').value,
                    jawaban: jawaban
                })
            })
            .then(res => res.json())
            .then(res => { 
                showSuccessMessage(res.message || "Jawaban berhasil dikirim!"); 
                setTimeout(() => location.reload(), 3000); 
            })
            .catch(err => {
                alert("Gagal mengirim jawaban ke server.");
                console.error(err);
            });
        }

        function showSuccessMessage(message, duration = 3000) {
            const alertBox = document.getElementById('alertBox');
            document.getElementById('msgText').innerText = message;
            alertBox.classList.remove('d-none');
            setTimeout(() => alertBox.classList.add('d-none'), duration);
        }

        // ========================================================
        // TAMBAHAN: FITUR KEAMANAN & DETEKSI REAKSI MENCURIGAKAN
        // ========================================================
        let jumlahPelanggaran = 0;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && usernameLogin !== "") { 
                jumlahPelanggaran++;
                alert("⚠️ PELANGGARAN DETEKSI!\nAnda keluar dari layar ujian atau membuka aplikasi lain.\nPeringatan ke-" + jumlahPelanggaran);
                
                // Opsional: Kirim log kecurangan langsung ke Google Sheets secara real-time
                fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ type: "logCheat", username: usernameLogin, pelanggaran: "Keluar Tab/Minimize ke-" + jumlahPelanggaran })
                });
            }
        });

        window.addEventListener("blur", () => {
            if (document.getElementById('ujianPage').classList.contains('active')) {
                jumlahPelanggaran++;
                alert("⚠️ PELANGGARAN DETEKSI!\nLayar kehilangan fokus. Dilarang membuka notifikasi atau layar ganda!\nPeringatan ke-" + jumlahPelanggaran);
            }
        });

        document.addEventListener("contextmenu", (e) => e.preventDefault());
        document.addEventListener("copy", (e) => e.preventDefault());
        document.addEventListener("cut", (e) => e.preventDefault());
        document.addEventListener("paste", (e) => e.preventDefault());

        document.addEventListener("click", () => {
            if (document.getElementById('ujianPage').classList.contains('active')) {
                let elem = document.documentElement;
                if (!document.fullscreenElement) {
                    elem.requestFullscreen().catch((err) => {
                        console.log("Gagal masuk ke mode fullscreen otomatis: " + err.message);
                    });
                }
            }
        });
    </script>
</body>
</html>

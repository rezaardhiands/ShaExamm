<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; transition: 0.3s; }
        .opsi-container:hover { background: #f8f9fa; }
        .selected { background: #d1e7dd; border-color: #0f5132; }
    </style>
</head>
<body class="bg-light">

    <script>const API_URL = "https://script.google.com/macros/s/AKfycbx79KoPf2FJq9VI2ofk5FJLLr2FuLuJMmcII6sbS3UF4Xt9h_Apob63WNIv4prw80N1/exec";</script>

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4 class="text-center">Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <script>
        let usernameLogin = "";

        // FUNGSI LOGIN
       function login() {
            let u = document.getElementById('u').value;
            let p = document.getElementById('p').value;
            const btn = document.querySelector('#loginPage button');
            
            if(u === "" || p === "") { 
                alert("Isi Username & Password!"); 
                return; 
            }

            btn.innerText = "Memproses...";
            btn.disabled = true;

            fetch(API_URL, {
                method: "POST",
                headers: {
                    // Ini kunci utamanya untuk bypass blokir CORS dari Google
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify({ type: "login", username: u, password: p })
            })
            .then(res => {
                if (!res.ok) throw new Error("Gagal terhubung ke server GAS");
                return res.json();
            })
            .then(res => {
                btn.innerText = "MASUK";
                btn.disabled = false;
                if(res.status === "success") {
                    usernameLogin = u;
                    alert("Berhasil Login! Selamat mengerjakan.");
                    // Tambahkan logika pindah ke halaman ujian di sini
                } else {
                    alert("Login Gagal: Username/Password salah.");
                }
            })
            .catch(err => {
                btn.innerText = "MASUK";
                btn.disabled = false;
                alert("Error: Tidak dapat terhubung ke server. Pastikan URL Web App benar.");
                console.error("Detail Error:", err);
            });
        }

       // --- SUPER CHEAT DETECTOR (OPTIMAL UNTUK WEB2APK) ---
        let jumlahPelanggaran = 0;

        function kirimLogPelanggaran(jenisPelanggaran) {
            if (usernameLogin !== "") {
                jumlahPelanggaran++;
                
                // Alert untuk memberi shock therapy ke siswa
                alert(`PERINGATAN KE-${jumlahPelanggaran}!\nPelanggaran Terdeteksi: ${jenisPelanggaran}.\nCatatan ini telah dikirim ke server pengawas!`);
                
                // Kirim log secara diam-diam ke Google Sheets (no-cors)
                fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ 
                        type: "log", 
                        username: usernameLogin, 
                        pelanggaran: `${jenisPelanggaran} (Pelanggaran ke-${jumlahPelanggaran})` 
                    })
                });
            }
        }

        // 1. DETEKSI TARIK TOOLBAR / DI-MINIMIZE / PINDAH TAB (Paling Akurat)
        // Ketika siswa menarik toolbar atas atau menekan tombol home, layar web otomatis kehilangan fokus (Blur)
        window.addEventListener("blur", () => {
            // Diberi sedikit jeda untuk memastikan bukan karena alert bawaan web
            setTimeout(() => {
                if (!document.hasFocus()) {
                    kirimLogPelanggaran("Menarik Toolbar Atas / Buka Notifikasi / Keluar Aplikasi");
                }
            }, 600);
        });

        // 2. DETEKSI PERUBAHAN VISIBILITAS LAYAR
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                kirimLogPelanggaran("Aplikasi Disembunyikan / Sesi Ujian Ditinggalkan");
            }
        });

        // 3. DETEKSI KURSOR MENINGGALKAN AREA UJIAN (Jika ada yang iseng pakai mouse/emulator)
        document.addEventListener("mouseleave", () => {
            kirimLogPelanggaran("Mencoba Mengarahkan Kursor Keluar Layar");
        });

        // 4. BLOKIR TOTAL AKSES MODIFIKASI (Copy, Cut, Paste, Klik Kanan)
        document.addEventListener("copy", (e) => { e.preventDefault(); return false; });
        document.addEventListener("cut", (e) => { e.preventDefault(); return false; });
        document.addEventListener("paste", (e) => { e.preventDefault(); return false; });
        document.addEventListener("contextmenu", (e) => { e.preventDefault(); return false; });

        // 5. BLOKIR SEBAGIAN TOMBOL FISIK / KEYBOARD (Jika siswa mencoba pakai keyboard eksternal)
        document.addEventListener("keydown", (e) => {
            // Blokir tombol F12, Ctrl+Shift+I, Ctrl+U (Inspect Element)
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                kirimLogPelanggaran("Mencoba Membuka Fitur Inspeksi Kode");
                return false;
            }
        });
    </script>
</body>
</html>
